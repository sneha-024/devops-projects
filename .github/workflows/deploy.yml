name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t sneha24012004/sneha-app:latest .

      - name: Push Image
        run: |
          docker push sneha24012004/sneha-app:latest

      - name: Deploy EC2
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            sudo docker pull sneha24012004/sneha-app:latest

            sudo docker stop sneha-container || true

            sudo docker rm sneha-container || true

            sudo docker run -d \
              --name sneha-container \
              -p 80:80 \
              sneha24012004/sneha-app:latest
