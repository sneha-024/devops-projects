<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sneha Saraf | DevOps</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;text-align:center}
.container{padding:40px}
h1{font-size:3rem;background:linear-gradient(135deg,#00e5ff,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
.badge{display:inline-block;background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.3);color:#00e5ff;padding:8px 20px;border-radius:100px;margin:5px;font-size:.85rem}
p{color:#64748b;margin:16px 0}
.pulse{width:10px;height:10px;border-radius:50%;background:#00ff88;display:inline-block;animation:pulse 2s infinite;margin-right:8px}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,0.4)}70%{box-shadow:0 0 0 10px rgba(0,255,136,0)}}
</style>
</head>
<body>
<div class="container">
<div style="font-size:60px">🐳</div>
<h1>Sneha Saraf</h1>
<p>Cloud & DevOps | MLOps Engineer</p>
<div>
<span class="badge">🐳 Docker</span>
<span class="badge">⚙️ GitHub Actions</span>
<span class="badge">☁️ AWS EC2</span>
<span class="badge">🔁 CI/CD</span>
</div>
<p style="margin-top:24px">
<span class="pulse"></span>
Deployed via automated CI/CD Pipeline
</p>
</div>
</body>
</html>
